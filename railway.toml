[build]
builder = "nixpacks"

[deploy]
startCommand = "gunicorn gigapp.asgi:application -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT --workers 2 --timeout 120"
preDeployCommand = "python manage.py migrate --noinput && python manage.py collectstatic --noinput"
healthcheckPath = "/api/health/"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5